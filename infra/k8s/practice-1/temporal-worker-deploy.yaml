apiVersion: apps/v1
kind: Deployment
metadata:
  name: temporal-worker
  namespace: boltline-playground
  labels:
    app: temporal-worker
    practice: practice-1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: temporal-worker
  template:
    metadata:
      labels:
        app: temporal-worker
        practice: practice-1
    spec:
      containers:
        - name: worker
          image: boltline/practice-temporal-kafka:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: TEMPORAL_ADDRESS
              value: "temporal-service:7233"
            - name: KAFKA_BROKER
              value: "kafka-service:29092"
            - name: NODE_ENV
              value: "production"
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - ps aux | grep "node" | grep -v grep
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
