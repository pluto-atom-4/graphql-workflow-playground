services:
  postgres:
    image: postgres:15-alpine
    container_name: boltline-postgres
    environment:
      POSTGRES_USER: boltline
      POSTGRES_PASSWORD: boltline
      POSTGRES_DB: boltline_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./../../practice-2-hasura-graphql/postgres/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./../../practice-2-hasura-graphql/postgres/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U boltline -d boltline_dev"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - boltline_net

  postgres_temporal:
    image: postgres:15-alpine
    container_name: boltline-postgres-temporal
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
    ports:
      - "5433:5432"
    volumes:
      - temporal_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - boltline_net

  temporal:
    image: temporalio/auto-setup:1.24.0
    container_name: boltline-temporal
    depends_on:
      postgres_temporal:
        condition: service_healthy
    environment:
      DB: postgresql
      DB_PORT: 5432
      POSTGRES_USER: temporal
      POSTGRES_PWD: temporal
      POSTGRES_SEEDS: postgres_temporal
    ports:
      - "7233:7233"
    networks:
      - boltline_net

  temporal-ui:
    image: temporalio/ui:2.28.0
    container_name: boltline-temporal-ui
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: "http://localhost:3000"
    ports:
      - "8088:8080"
    depends_on:
      - temporal
    networks:
      - boltline_net

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: boltline-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    networks:
      - boltline_net

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: boltline-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - boltline_net

  hasura:
    image: hasura/graphql-engine:v2.40.0
    container_name: boltline-hasura
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      HASURA_GRAPHQL_DATABASE_URL: postgres://boltline:boltline@postgres:5432/boltline_dev
      HASURA_GRAPHQL_ADMIN_SECRET: myadminsecret
      HASURA_GRAPHQL_ENABLE_CONSOLE: "true"
      HASURA_GRAPHQL_DEV_MODE: "true"
      HASURA_GRAPHQL_ENABLED_LOG_TYPES: startup,http-log,webhook-log,websocket-log,query-log
    ports:
      - "8080:8080"
    networks:
      - boltline_net

networks:
  boltline_net:
    driver: bridge

volumes:
  postgres_data:
  temporal_pg_data:
